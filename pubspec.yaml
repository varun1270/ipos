  # ----------------------------
  # flutter_local_notifications: ^19.4.0

  # ----------------------------
  # WEB SUPPORT
  # ----------------------------
  # universal_html: ^2.2.4

  # ----------------------------
  # RESPONSIVE UI
  # ----------------------------
  # responsive_builder: ^0.7.1

  # ----------------------------
  # LOADING / TOASTS
  # ----------------------------
  # flutter_easyloading: ^3.0.5
  # bot_toast: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ----------------------------
  # CODE GENERATION
  # ----------------------------
  build_runner: ^2.7.0

  # ----------------------------
  # FREEZED
  # ----------------------------
  freezed: ^3.2.0
  freezed_annotation: ^3.1.0

  # ----------------------------
  # JSON
  # ----------------------------
  json_serializable: ^6.11.1
  json_annotation: ^4.9.0

  # ----------------------------
  # RIVERPOD GENERATOR
  # ----------------------------
  # riverpod_generator: ^2.6.5  # temporarily disabled; re-enable after resolving build/source_gen/analyzer compatibility

  # ----------------------------
  # DRIFT GENERATOR
  # ----------------------------
  # drift_dev: ^2.28.1

  # ----------------------------
  # HIVE GENERATOR
  # ----------------------------
  # hive_generator: ^2.0.1  # temporarily disabled to resolve generator version conflicts

  # ----------------------------
  # APP ICONS
  # ----------------------------
  flutter_launcher_icons: ^0.14.4

  # ----------------------------
  # SPLASH SCREEN
  # ----------------------------
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/logos/
    - assets/icons/
    - assets/images/
    - assets/illustrations/
    - assets/animations/
    - assets/lottie/
    - assets/mock/
    - assets/translations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logos/app_logo.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/logos/app_logo.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/logos/splash_logo.png

  android_12:
    image: assets/logos/splash_logo.png
    color: "#ffffff"
